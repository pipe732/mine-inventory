{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mina inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <!-- Overlay móvil -->
    <div class="aside-overlay" id="asideOverlay"></div>

    <!-- Botón flotante hamburguesa — solo visible en móvil -->
    <button class="btn-sidebar-toggle" id="btnToggleSidebar" aria-label="Abrir menú">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <div class="body-wrap">
      {% include "partials/aside.html" %}
      <main>{% block content %}{% endblock %}</main>
    </div>

    {% include "partials/accesibilidad.html" %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/accesibilidad.js' %}"></script>

    <!-- Sidebar móvil toggle -->
    <script>
      (function() {
        const btn     = document.getElementById('btnToggleSidebar');
        const aside   = document.querySelector('aside');
        const overlay = document.getElementById('asideOverlay');

        function openSidebar()  { aside.classList.add('aside-open');    overlay.classList.add('active'); }
        function closeSidebar() { aside.classList.remove('aside-open'); overlay.classList.remove('active'); }

        if (btn) btn.addEventListener('click', function() {
          aside.classList.contains('aside-open') ? closeSidebar() : openSidebar();
        });
        if (overlay) overlay.addEventListener('click', closeSidebar);

        window.addEventListener('resize', function() {
          if (window.innerWidth > 768) closeSidebar();
        });
      })();
    </script>

    {% block js %}{% endblock js %}
  </body>
</html>
