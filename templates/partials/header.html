<header>
    <div class="header-brand">
        <i class="bi bi-cloud-haze2-fill"></i>
        Mine inventory
    </div>

    <div class="dropdown" style="margin-left:auto; position:relative;">
        <button type="button"
                data-bs-toggle="dropdown"
                data-bs-display="static"
                aria-expanded="false"
                style="background:none; border:none; cursor:pointer; padding:0; display:flex; align-items:center; gap:0.3rem;"
                class="header-user dropdown-toggle">
            <i class="bi bi-person-circle"></i>
            {{ request.session.usuario_nombre|default:"Invitado" }}
        </button>
        <ul class="dropdown-menu dropdown-menu-end" style="min-width:180px;">
            <li>
                <span class="dropdown-item-text small text-muted">
                    <i class="bi bi-shield-check me-1"></i>
                    {{ request.session.usuario_rol|default:"Sin rol" }}
                </span>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
                <a class="dropdown-item text-danger" href="/Usuario/logout/">
                    <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
                </a>
            </li>
        </ul>
    </div>
</header>
