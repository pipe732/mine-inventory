<div style="display:flex; align-items:center; justify-content:space-between; gap:.75rem; padding:.85rem 1rem; border-radius:var(--radius-md); background:rgba(9,77,146,.04); border:1px solid rgba(9,77,146,.1);">
  <div style="min-width:0;">
    <div style="font-weight:700; color:var(--text-main); font-size:.9rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
      {{ label }}
    </div>
    <div style="font-size:.78rem; color:var(--text-muted); margin-top:.22rem;">
      {% if activa %}Recibirás notificaciones para este evento.{% else %}No recibirás notificaciones para este evento.{% endif %}
    </div>
  </div>
  <span style="font-size:.78rem; font-weight:700; color:{% if activa %}var(--sage){% else %}var(--text-muted){% endif %};">
    {% if activa %}Activo{% else %}Inactivo{% endif %}
  </span>
</div>
