{# templates/partials/notificaciones.html #}
{# Incluir dentro del aside, justo antes del nav-bottom #}

<div id="notif-widget" style="position:relative; padding:.4rem .6rem .2rem;">

  <!-- ── Botón campanita ── -->
  <button id="notif-toggle"
          title="Notificaciones"
          style="width:100%; display:flex; align-items:center; gap:.6rem;
                 padding:.45rem .75rem; border-radius:var(--radius-sm);
                 background:transparent; border:none; cursor:pointer;
                 color:rgba(239,236,202,.55); font-family:var(--font-ui);
                 font-size:.85rem; font-weight:600; transition:all .15s;
                 position:relative;">

    <!-- Icono campana SVG -->
    <svg id="notif-bell-icon" width="16" height="16" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="1.8"
         style="flex-shrink:0; transition:stroke .2s;">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>

    <span style="flex:1; text-align:left;">Notificaciones</span>

    <!-- Badge contador -->
    <span id="notif-badge"
          style="display:none; min-width:18px; height:18px; padding:0 5px;
                 border-radius:20px; background:var(--rust); color:#fff;
                 font-family:var(--font-mono); font-size:.65rem; font-weight:700;
                 line-height:18px; text-align:center; flex-shrink:0;
                 box-shadow:0 2px 6px rgba(152,71,62,.45);">
      0
    </span>
  </button>

  <!-- ── Panel desplegable ── -->
  <div id="notif-panel"
       style="display:none; position:fixed; bottom:5.5rem; left:var(--aside-w);
              width:340px; z-index:99990;
              background:var(--bg-surface);
              border:1px solid var(--border-color);
              border-radius:var(--radius-lg);
              box-shadow:0 16px 48px rgba(27,32,33,.18);
              overflow:hidden;
              animation:notifSlide .18s ease;">

    <!-- Cabecera del panel -->
    <div style="display:flex; align-items:center; justify-content:space-between;
                padding:.75rem 1.1rem;
                background:var(--dark); border-bottom:2px solid var(--rust);">
      <span style="font-family:var(--font-ui); font-weight:700; font-size:.85rem;
                   color:var(--cream); letter-spacing:.04em;">
        Notificaciones
      </span>
      <span id="notif-header-count"
            style="font-family:var(--font-mono); font-size:.7rem;
                   background:rgba(152,71,62,.25); color:var(--cream);
                   padding:.1rem .5rem; border-radius:20px;">
        0
      </span>
    </div>

    <!-- Lista de notificaciones -->
    <div id="notif-list"
         style="max-height:360px; overflow-y:auto;">
      <!-- Se llena con JS -->
      <div id="notif-empty"
           style="text-align:center; padding:2.5rem 1rem;
                  color:var(--text-muted); font-family:var(--font-ui); font-size:.85rem;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.3"
             style="opacity:.3; display:block; margin:0 auto .6rem;">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        Sin notificaciones pendientes
      </div>
    </div>

    <!-- Pie del panel -->
    <div style="padding:.55rem 1rem; border-top:1px solid var(--border-color);
                background:rgba(27,32,33,.03); display:flex; justify-content:flex-end;">
      <button onclick="notifMarcarTodas()"
              style="font-family:var(--font-ui); font-size:.75rem; font-weight:600;
                     background:none; border:none; color:var(--text-muted);
                     cursor:pointer; padding:.2rem .4rem; border-radius:4px;
                     transition:color .15s;">
        Marcar todas como leídas
      </button>
    </div>
  </div>
</div>

<style>
@keyframes notifSlide {
  from { opacity:0; transform:translateX(-8px); }
  to   { opacity:1; transform:translateX(0); }
}

#notif-toggle:hover {
  background: rgba(255,255,255,.06) !important;
  color: rgba(239,236,202,.85) !important;
}

/* Ítem de notificación */
.notif-item {
  display: flex;
  align-items: flex-start;
  gap: .75rem;
  padding: .75rem 1.1rem;
  border-bottom: 1px solid var(--border-color);
  transition: background .12s;
  cursor: default;
}
.notif-item:last-child { border-bottom: none; }
.notif-item:hover { background: rgba(9,77,146,.04); }
.notif-item.notif-unread { background: rgba(152,71,62,.04); }

.notif-icon-wrap {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: .05rem;
}

.notif-tipo-stock-critico  { background:rgba(152,71,62,.12); color:var(--rust); border:1px solid rgba(152,71,62,.2); }
.notif-tipo-stock-bajo     { background:rgba(196,144,10,.1); color:#c4900a;    border:1px solid rgba(196,144,10,.2); }
.notif-tipo-prestamo-vencido{ background:rgba(152,71,62,.1); color:var(--rust); border:1px solid rgba(152,71,62,.18); }
.notif-tipo-prestamo-proximo{ background:rgba(196,144,10,.1); color:#c4900a;   border:1px solid rgba(196,144,10,.18); }
.notif-tipo-devolucion     { background:rgba(9,77,146,.1);   color:var(--navy); border:1px solid rgba(9,77,146,.18); }
.notif-tipo-pendiente      { background:rgba(196,144,10,.1); color:#c4900a;    border:1px solid rgba(196,144,10,.18); }

.notif-item-title {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: .82rem;
  color: var(--text-main);
  line-height: 1.3;
  margin-bottom: .15rem;
}
.notif-item-desc {
  font-family: var(--font-ui);
  font-size: .75rem;
  color: var(--text-muted);
  line-height: 1.4;
}
.notif-item-time {
  font-family: var(--font-mono);
  font-size: .66rem;
  color: var(--text-muted);
  margin-top: .2rem;
  opacity: .7;
}

/* Modo oscuro */
body.dark-mode #notif-panel {
  background: #182225 !important;
  border-color: rgba(239,236,202,.07) !important;
}
body.dark-mode .notif-item:hover { background: rgba(239,236,202,.04) !important; }
body.dark-mode .notif-item.notif-unread { background: rgba(152,71,62,.07) !important; }
body.dark-mode .notif-item-title { color: var(--cream) !important; }
body.dark-mode .notif-item-desc  { color: rgba(239,236,202,.5) !important; }

/* Modo claro override del aside */
aside[data-acc-dark] #notif-toggle { color: rgba(27,32,33,.55) !important; }
aside[data-acc-dark] #notif-toggle:hover { color: #1B2021 !important; }
</style>

<script>
(function () {

  /* ══════════════════════════
     ESTADO
  ══════════════════════════ */
  var _notifs    = [];
  var _panelOpen = false;
  var _leidas    = JSON.parse(localStorage.getItem('notif_leidas') || '[]');

  /* ══════════════════════════
     CARGAR NOTIFICACIONES VÍA AJAX
  ══════════════════════════ */
  function cargarNotificaciones() {
    fetch('/notificaciones/json/')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        _notifs = data.notificaciones || [];
        renderPanel();
        actualizarBadge();
      })
      .catch(function () {
        // Si falla la petición (ruta no existe aún), construir desde el DOM
        _notifs = obtenerNotifDesdeDOM();
        renderPanel();
        actualizarBadge();
      });
  }

  /* ══════════════════════════
     FALLBACK: leer datos del DOM
     (los templates inyectan data-notifs en un <script> oculto)
  ══════════════════════════ */
  function obtenerNotifDesdeDOM() {
    var el = document.getElementById('notif-data-json');
    if (!el) return [];
    try { return JSON.parse(el.textContent); } catch (e) { return []; }
  }

  /* ══════════════════════════
     RENDERIZAR PANEL
  ══════════════════════════ */
  function renderPanel() {
    var list  = document.getElementById('notif-list');
    var empty = document.getElementById('notif-empty');
    if (!list) return;

    // Limpiar ítems anteriores (salvo #notif-empty)
    Array.from(list.children).forEach(function (c) {
      if (c.id !== 'notif-empty') c.remove();
    });

    if (_notifs.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    _notifs.forEach(function (n) {
      var leida  = _leidas.indexOf(n.id) !== -1;
      var div    = document.createElement('div');
      div.className = 'notif-item' + (leida ? '' : ' notif-unread');
      div.dataset.id = n.id;

      div.innerHTML =
        '<div class="notif-icon-wrap notif-tipo-' + (n.tipo || 'stock-bajo') + '">' +
          iconoTipo(n.tipo) +
        '</div>' +
        '<div style="flex:1;min-width:0;">' +
          '<div class="notif-item-title">' + escHtml(n.titulo) + '</div>' +
          '<div class="notif-item-desc">'  + escHtml(n.descripcion) + '</div>' +
          '<div class="notif-item-time">'  + escHtml(n.tiempo || '') + '</div>' +
        '</div>' +
        (n.url
          ? '<a href="' + n.url + '" style="font-family:var(--font-ui);font-size:.72rem;' +
            'color:var(--navy);white-space:nowrap;font-weight:600;flex-shrink:0;' +
            'align-self:center;text-decoration:underline;text-underline-offset:2px;">Ver →</a>'
          : '') ;

      list.insertBefore(div, empty);
    });
  }

  function iconoTipo(tipo) {
    var iconos = {
      'stock-critico':
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">' +
        '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>' +
        '<line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',

      'stock-bajo':
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">' +
        '<path d="M22 12H16L14 15H10L8 12H2"/>' +
        '<path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>',

      'prestamo-vencido':
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">' +
        '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>' +
        '<line x1="12" y1="16" x2="12.01" y2="16"/></svg>',

      'prestamo-proximo':
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">' +
        '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',

      'devolucion':
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">' +
        '<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>',

      'pendiente':
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">' +
        '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/>' +
        '<line x1="8" y1="12" x2="16" y2="12"/></svg>',
    };
    return iconos[tipo] || iconos['stock-bajo'];
  }

  /* ══════════════════════════
     BADGE — cantidad no leídas
  ══════════════════════════ */
  function actualizarBadge() {
    var badge = document.getElementById('notif-badge');
    var hdrCnt= document.getElementById('notif-header-count');
    if (!badge) return;

    var noLeidas = _notifs.filter(function (n) {
      return _leidas.indexOf(n.id) === -1;
    }).length;

    if (noLeidas > 0) {
      badge.style.display = 'inline-block';
      badge.textContent   = noLeidas > 99 ? '99+' : noLeidas;
      // Animar la campanita
      var bell = document.getElementById('notif-bell-icon');
      if (bell) {
        bell.style.stroke = '#e07870';
        bell.style.filter = 'drop-shadow(0 0 4px rgba(152,71,62,.6))';
      }
    } else {
      badge.style.display = 'none';
      var bell = document.getElementById('notif-bell-icon');
      if (bell) { bell.style.stroke = ''; bell.style.filter = ''; }
    }

    if (hdrCnt) hdrCnt.textContent = _notifs.length + ' total';
  }

  /* ══════════════════════════
     TOGGLE PANEL
  ══════════════════════════ */
  var toggle = document.getElementById('notif-toggle');
  var panel  = document.getElementById('notif-panel');

  if (toggle && panel) {
    toggle.addEventListener('click', function (e) {
      e.stopPropagation();
      _panelOpen = !_panelOpen;
      panel.style.display = _panelOpen ? 'block' : 'none';
      if (_panelOpen) cargarNotificaciones();
    });

    document.addEventListener('click', function (e) {
      var widget = document.getElementById('notif-widget');
      if (widget && !widget.contains(e.target)) {
        _panelOpen = false;
        panel.style.display = 'none';
      }
    });
  }

  /* ══════════════════════════
     MARCAR TODAS COMO LEÍDAS
  ══════════════════════════ */
  window.notifMarcarTodas = function () {
    _notifs.forEach(function (n) {
      if (_leidas.indexOf(n.id) === -1) _leidas.push(n.id);
    });
    localStorage.setItem('notif_leidas', JSON.stringify(_leidas));
    renderPanel();
    actualizarBadge();
  };

  /* ══════════════════════════
     CARGA INICIAL
  ══════════════════════════ */
  // Cargar notificaciones al arrancar
  document.addEventListener('DOMContentLoaded', function () {
    cargarNotificaciones();
    // Refrescar cada 2 minutos
    setInterval(cargarNotificaciones, 120000);
  });

  /* ══════════════════════════
     UTIL
  ══════════════════════════ */
  function escHtml(s) {
    if (!s) return '';
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

})();
</script>
