{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro · Centro Minero</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    .left-bg { position:absolute; inset:0; background-size:cover; background-position:center; opacity:.35; filter:blur(4px); }
    @media(max-width:860px){ .panel-right{ width:100%!important; min-width:unset; border-left:none!important; } }
    #doc-hint { font-size:.7rem; margin-top:.35rem; min-height:1rem; transition: color .2s; }
  </style>
</head>
<body class="overflow-hidden bg-dark">

<div class="d-flex vh-100">
  <div class="flex-grow-1 position-relative overflow-hidden d-flex align-items-center justify-content-center p-5">
    <div class="left-bg" style="background-image:url('{% static 'img/fondo.png' %}');"></div>
    <div class="position-relative z-1 d-flex flex-column align-items-center gap-4 w-100" style="max-width:620px;">
      <div class="text-center">
        <h2 class="fs-3 fw-bold text-white mb-1">Centro Minero</h2>
        <p class="text-uppercase text-white-50 small mb-0">Regional Boyacá · SENA</p>
      </div>
      <div class="ratio ratio-16x9 w-100 border border-white border-2" style="border-radius:16px; overflow:hidden;">
        <img src="{% static 'img/fondo.png' %}" alt="Campus Centro Minero" class="w-100 h-100 object-fit-cover" />
      </div>
    </div>
  </div>

  <div class="panel-right d-flex align-items-center justify-content-center p-4 overflow-y-auto bg-light border-start border-white border-opacity-25" style="width:420px; min-width:420px;">
    <div class="w-100">
      <div class="d-flex align-items-center gap-3 bg-black bg-opacity-10 rounded-3 p-3 mb-4">
        <img src="{% static 'img/Logo-del-sena-Verde-150x150-removebg-preview.png' %}" alt="SENA" width="42" height="42" style="object-fit:contain;" />
        <div>
          <p class="fw-bold mb-0">Crear cuenta</p>
          <p class="mb-0 text-muted small">Centro Minero · Regional Boyacá</p>
        </div>
      </div>

      <div class="d-flex rounded-3 p-1 gap-1 mb-4 bg-success-subtle border border-success-subtle">
        <button class="flex-fill py-2 px-3 rounded-2 fw-semibold border-0 bg-transparent text-success-emphasis" onclick="window.location.href='{% url 'login' %}'">Inicio Sesión</button>
        <button class="flex-fill py-2 px-3 rounded-2 fw-semibold border-0 bg-success text-white">Registro</button>
      </div>

      {% if messages %}
        {% for message in messages %}
          <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-success{% endif %} d-flex align-items-center gap-2 py-2 px-3 small">
            <i class="bi {% if message.tags == 'error' %}bi-exclamation-circle-fill{% else %}bi-check-circle-fill{% endif %}"></i>
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <form method="POST" action="{% url 'registro' %}" id="regForm" autocomplete="off" novalidate>
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label text-uppercase fw-bold text-secondary" style="font-size:.65rem;letter-spacing:.06em;" for="username">Nombre completo</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" id="username" name="username" class="form-control" placeholder="Ej. Juan Rodríguez" value="{{ username|default:'' }}" required />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label text-uppercase fw-bold text-secondary" style="font-size:.65rem;letter-spacing:.06em;" for="email">Correo electrónico</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" name="email" class="form-control" placeholder="correo@ejemplo.com" value="{{ email|default:'' }}" required />
          </div>
        </div>

        <div class="row g-2 mb-3">
          <div class="col-5">
            <label class="form-label text-uppercase fw-bold text-secondary" style="font-size:.65rem;letter-spacing:.06em;" for="tipo_documento">Tipo de documento</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-card-text"></i></span>
              <select id="tipo_documento" name="tipo_documento" class="form-select" required>
                <option value="CC" {% if tipo_documento|default:'CC' == 'CC' %}selected{% endif %}>CC – Cédula</option>
                <option value="CE" {% if tipo_documento == 'CE' %}selected{% endif %}>CE – Extranjería</option>
                <option value="PP" {% if tipo_documento == 'PP' %}selected{% endif %}>PP – Pasaporte</option>
                <option value="TI" {% if tipo_documento == 'TI' %}selected{% endif %}>TI – Tarjeta Identidad</option>
              </select>
            </div>
          </div>

          <div class="col">
            <label class="form-label text-uppercase fw-bold text-secondary" style="font-size:.65rem;letter-spacing:.06em;" for="documento">Número de documento</label>
            <input type="text" id="documento" name="documento" class="form-control" placeholder="Número" value="{{ documento|default:'' }}" required />
            <div id="doc-hint" class="text-muted"></div>
          </div>
        </div>

        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label text-uppercase fw-bold text-secondary" style="font-size:.65rem;letter-spacing:.06em;" for="password1">Contraseña</label>
            <input type="password" id="password1" name="password1" class="form-control" placeholder="••••••••" required />
          </div>
          <div class="col-6">
            <label class="form-label text-uppercase fw-bold text-secondary" style="font-size:.65rem;letter-spacing:.06em;" for="password2">Confirmar</label>
            <input type="password" id="password2" name="password2" class="form-control" placeholder="••••••••" required />
          </div>
        </div>

        <button type="submit" class="btn btn-success w-100 fw-bold py-2">
          {% csrf_token %}
          Registrarse <i class="bi bi-arrow-right ms-1"></i>
        </button>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/usuario.js' %}"></script>
<script src="{% static 'js/registro.js' %}"></script>
</body>
</html>
