{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <h2 class="mb-4">Registrar Nuevo Tipo de Estado</h2>
    
    <div class="card shadow-sm">
        <div class="card-body">
            <form method="POST" class="row g-3">
                {% csrf_token %}
                
                {% for field in form %}
                <div class="col-md-6">
                    <label class="form-label fw-bold">{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}

                <div class="col-12 d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary px-4">Guardar</button>
                    <a href="{% url 'consultar_estado' %}" class="btn btn-outline-secondary">Volver</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
