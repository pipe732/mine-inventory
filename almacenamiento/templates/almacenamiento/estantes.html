{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
  <h2>Lista de Estantes</h2>

  <a href="{% url 'crear_estante' %}" class="btn btn-primary mb-3">
    Nuevo Estante
  </a>

  <table class="table table-bordered">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Ubicación</th>
      </tr>
    </thead>
    <tbody>
      {% for estante in estantes %}
      <tr>
        <td>{{ estante.id }}</td>
        <td>{{ estante.nombre }}</td>
        <td>{{ estante.ubicacion }}</td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="3">No hay estantes</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
